name: CI Pipeline

on:
  push:
    branches:
      - prod
      - dev
      - cicd
  pull_request:
    branches:
      - prod
      - dev

permissions:
  contents: read
  packages: write

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Backend)
        run: npm ci

      - name: Install dependencies (Frontend)
        run: cd frontend && npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint Backend
        run: npm run lint

      - name: Typecheck Backend
        run: npm run typecheck

      - name: Lint Frontend
        run: cd frontend && npm run lint

      - name: Typecheck Frontend
        run: cd frontend && npm run typecheck

  test-and-coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticket_booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticket_booking?schema=public
      JWT_ACCESS_SECRET: test-secret
      JWT_REFRESH_SECRET: test-secret
      NOTIFICATION_MODE: async
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Setup Database Schema
        run: npx prisma db push

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint for Backend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Run Hadolint for Nginx
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.nginx

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          # Find all .sh files excluding node_modules and run shellcheck
          find . -type f -name "*.sh" -not -path "*/node_modules/*" -exec shellcheck {} + || true

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: sudo apt-get install -y yamllint
      - name: Run yamllint
        run: yamllint .

  build-and-push:
    needs: [lint-and-typecheck, test-and-coverage, hadolint, shellcheck, yamllint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/prod' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.ref == 'refs/heads/prod' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag

      - name: Extract metadata (tags, labels) for Frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/prod' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.ref == 'refs/heads/prod' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
