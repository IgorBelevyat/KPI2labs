name: CI Pipeline

on:
  push:
    branches:
      - prod
      - dev
      - cicd
  pull_request:
    branches:
      - prod
      - dev

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Backend)
        run: npm ci

      - name: Install dependencies (Frontend)
        run: cd frontend && npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Lint Backend
        run: npm run lint

      - name: Typecheck Backend
        run: npm run typecheck

      - name: Lint Frontend
        run: cd frontend && npm run lint

      - name: Typecheck Frontend
        run: cd frontend && npm run typecheck

  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint for Backend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Run Hadolint for Nginx
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.nginx

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          # Find all .sh files excluding node_modules and run shellcheck
          find . -type f -name "*.sh" -not -path "*/node_modules/*" -exec shellcheck {} + || true

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: sudo apt-get install -y yamllint
      - name: Run yamllint
        run: yamllint .

  build-and-push:
    needs: [lint-and-typecheck, test-and-coverage, hadolint, shellcheck, yamllint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/prod' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.ref == 'refs/heads/prod' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
